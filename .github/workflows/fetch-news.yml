name: Fetch News Agent

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      GPTUNNEL_KEY: ${{ secrets.GPTUNNEL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests feedparser python-dateutil

      - name: Download previous history
        run: |
          git fetch --depth=1 origin gh-pages
          if git show-ref --verify refs/remotes/origin/gh-pages 2>/dev/null; then
            git checkout gh-pages -- output/history.json 2>/dev/null || echo "no history yet"
          fi

      - name: Run agent
        run: python run_agent.py

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: true
