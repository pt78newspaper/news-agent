<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Feed PT78</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --card-hover: #222240;
    --text: #e0e0e0;
    --text-dim: #8888aa;
    --border: #2a2a4a;
    --accent: #7c5cfc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .header {
    padding: 40px 20px 20px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  }
  .header h1 { font-size: 28px; color: #fff; margin-bottom: 8px; }
  .header .subtitle { color: var(--text-dim); font-size: 14px; }
  .header .update-time { color: var(--accent); font-size: 13px; margin-top: 8px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
  .stats-row {
    display: flex; gap: 12px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 30px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    text-align: center;
    min-width: 100px;
  }
  .stat-card .num { font-size: 24px; font-weight: 700; color: #fff; }
  .stat-card .lbl { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .story { margin-bottom: 24px; }
  .story-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
  }
  .story-card:hover { border-color: var(--accent); background: var(--card-hover); }
  .story-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px;
  }
  .story-number {
    background: var(--accent);
    color: #fff;
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    flex-shrink: 0; margin-top: 2px;
  }
  .story-title {
    font-size: 17px; font-weight: 600;
    color: #fff;
    line-height: 1.4;
  }
  .story-body { padding: 16px 20px; }
  .perspectives-title {
    font-size: 12px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--text-dim);
    margin-bottom: 10px;
  }
  .perspectives { display: flex; flex-direction: column; gap: 8px; }
  .perspective {
    padding: 10px 14px;
    border-radius: 8px;
    border-left: 3px solid var(--region-color, var(--accent));
    background: rgba(255,255,255,0.03);
  }
  .perspective .region-tag {
    display: inline-block;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 4px;
    margin-bottom: 4px;
    color: #fff;
    background: var(--region-color, var(--accent));
  }
  .perspective .headline {
    font-size: 13px; color: var(--text);
    margin-bottom: 4px;
  }
  .perspective .meta {
    font-size: 11px; color: var(--text-dim);
  }
  .perspective .meta a {
    color: var(--accent); text-decoration: none;
  }
  .perspective .meta a:hover { text-decoration: underline; }
  .perspective .keywords {
    margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap;
  }
  .keyword {
    font-size: 10px; padding: 1px 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px; color: var(--text-dim);
  }
  .story-footer {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  .tag { color: var(--accent); }
  .no-news {
    text-align: center; padding: 60px 20px;
    color: var(--text-dim);
  }
  .no-news h2 { font-size: 22px; margin-bottom: 10px; color: #fff; }
  @media (max-width: 600px) {
    .header h1 { font-size: 22px; }
    .story-header { flex-direction: column; }
    .story-title { font-size: 15px; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>News Feed PT78</h1>
  <p class="subtitle">Global media monitoring - Perspective comparison</p>
  <p class="update-time">Updated: __UPDATE_TIME__</p>
</div>
<div class="container">
  <div class="stats-row">
    <div class="stat-card"><div class="num">__TOTAL_STORIES__</div><div class="lbl">Stories</div></div>
    <div class="stat-card"><div class="num">__TOTAL_SOURCES__</div><div class="lbl">Sources</div></div>
    <div class="stat-card"><div class="num">__REGIONS_COVERED__</div><div class="lbl">Regions</div></div>
  </div>
  __STORIES__
  <div style="text-align:center;padding:30px 0;color:var(--text-dim);font-size:12px">
    Generated by NewsAgentPT78 - Next update in 3 hours
  </div>
</div>
</body>
</html>
